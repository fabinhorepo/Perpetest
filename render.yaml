databases:
  - name: perpetest-db
    databaseName: perpetest_db
    user: perpetest_user
    plan: free
    version: 15
    region: us-east-1

services:
  - type: web
    name: perpetest-backend
    plan: free
    runtime: node
    region: us-east-1
    buildCommand: npm install --prefix backend && npm run build --prefix backend
    startCommand: npm start --prefix backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: perpetest-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
