databases:
  - name: perpetest-db
    databaseName: perpetest_db
    user: perpetest_user
    plan: free
    version: 16
    region: ohio
    ipAllowList: []

  - name: perpetest-redis
    provider: redis
    plan: free
    version: 7
    region: ohio
    evictionPolicy: noeviction
    maxmemoryPolicy: noeviction

services:
  - type: web
    name: perpetest-backend
    plan: free
    runtime: node
    region: ohio
    
    buildCommand: |
      cd backend && npm install && npm run build
    
    startCommand: cd backend && npm start
    
    healthCheckPath: /api/health
    healthCheckInterval: 30
    
    autoDeploy: true
    
    envVars:
      # Database
      - key: DATABASE_URL
        fromDatabase:
          name: perpetest-db
          property: connectionString
      
      # Redis Cache
      - key: REDIS_URL
        fromService:
          name: perpetest-redis
          type: redis
          property: connectionString
      
      # Environment
      - key: NODE_ENV
        value: production
      
      - key: LOG_LEVEL
        value: info
      
      # Security - Auto-generated by Render
      - key: JWT_SECRET
        generateValue: true
      
      - key: NEXTAUTH_SECRET
        generateValue: true
      
      # URL
      - key: NEXTAUTH_URL
        value: https://perpetest-backend.onrender.com
      
      # Services (se deployar Python services também)
      - key: RECOMMENDATION_SERVICE_URL
        value: https://perpetest-recommendation.onrender.com
      
      - key: DELIVERY_SERVICE_URL
        value: https://perpetest-delivery.onrender.com
      
      # Payment (quando integrar - deixe em branco por enquanto)
      - key: STRIPE_SECRET_KEY
        value: ""
      
      - key: STRIPE_WEBHOOK_SECRET
        value: ""
      
      # Outros
      - key: PORT
        value: 3000
      
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
