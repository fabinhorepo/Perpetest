databases:
  - name: perpetest-db
    plan: free

services:
  - type: web
    name: perpetest-backend
    runtime: node
    plan: free
    buildCommand: npm ci --prefix backend && npm run build --prefix backend
    startCommand: npm start --prefix backend
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: perpetest-db
          property: connectionString
