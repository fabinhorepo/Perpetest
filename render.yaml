databases:
  - name: perpetest-db
    plan: free

services:
  - type: web
    name: perpetest-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: NODE_ENV=production npm start
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: perpetest-db
          property: connectionString
